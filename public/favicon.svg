<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Dark Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#090514" />
    </radialGradient>
    
    <!-- Neon Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Neon Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Ambient Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Circular background for clean icon displays -->
  <rect width="100%" height="100%" rx="128" fill="url(#bgGrad)" />

  <g transform="translate(256, 256)">
    <!-- Glowing Outer Diamond -->
    <polygon points="0,-180 180,0 0,180 -180,0" fill="none" stroke="url(#cyanGrad)" stroke-width="8" opacity="0.3" filter="url(#glow)" />
    
    <!-- Outer Glowing Ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#purpleGrad)" stroke-width="4" stroke-dasharray="10 15" opacity="0.6" filter="url(#glow)" />

    <!-- Core Stylized 'M' Shape -->
    <!-- Left Pillar -->
    <path d="M -90,90 L -90,-40 C -90,-70 -60,-80 -40,-50 L 0,0 L 40,-50 C 60,-80 90,-70 90,-40 L 90,90" 
          fill="none" stroke="url(#purpleGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
          
    <!-- Inner Cyan Accent Core -->
    <path d="M -90,30 L -90,-30 L 0,60 L 90,-30 L 90,30" 
          fill="none" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

    <!-- Glowing Center Core Dot -->
    <circle cx="0" cy="0" r="12" fill="#ffffff" filter="url(#glow)" />
    <circle cx="0" cy="0" r="6" fill="#06b6d4" />
  </g>
</svg>
